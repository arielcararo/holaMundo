<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hola Mundo App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>¡Hola Mundo!</h1>
                <p class="subtitle">Bienvenido a mi primera aplicación</p>
            </div>
            
            <div class="content">
                <div class="message-box">
                    <p id="message">¡Haz clic en el botón para cambiar el mensaje!</p>
                </div>
                
                <div class="buttons">
                    <button id="changeBtn" class="btn primary">Cambiar Mensaje</button>
                    <button id="resetBtn" class="btn secondary">Reiniciar</button>
                </div>
                
                <div class="counter">
                    <p>Clicks: <span id="clickCount">0</span></p>
                </div>
            </div>
            
            <div class="footer">
                <p>Hecho con ❤️ usando HTML, CSS y JavaScript</p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
